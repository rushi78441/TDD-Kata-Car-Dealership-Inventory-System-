name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # -------------------------------------------------------------
  # Job 1: Backend Tests & Linting (FastAPI + PostgreSQL)
  # -------------------------------------------------------------
  backend-ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: car_dealership_inventory_system_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio httpx

      - name: Run Backend Tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgrespassword@localhost:5432/car_dealership_inventory_system_test
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgrespassword@localhost:5432/car_dealership_inventory_system_test
          SECRET_KEY: ci-secret-key-testing-only
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
        run: |
          pytest

  # -------------------------------------------------------------
  # Job 2: Frontend Tests & Linting (React + Vite)
  # -------------------------------------------------------------
  frontend-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Build Check
        run: npm run build